<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Based Network Threat Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='./css/register.css') }}" />
   
</head>
  <body>
    <canvas id="bg"></canvas>
    <form method="post" action="/register">
      <div class="card">

        <div class="shield-wrap">
          <div class="shield">
            <svg class="shield-svg" viewBox="0 0 76 86" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="sg" x1="38" y1="0" x2="38" y2="86" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#3d8bff" />
                  <stop offset="100%" stop-color="#0a3caa" />
                </linearGradient>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="2.5" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <!-- shield body -->
              <path d="M38 2L6 14v24c0 20 14 37 32 44 18-7 32-24 32-44V14L38 2z" fill="url(#sg)" stroke="#1a6bff" stroke-width="1.5" filter="url(#glow)" />
              <!-- inner highlight -->
              <path d="M38 8L12 18v20c0 16 11 30 26 36 15-6 26-20 26-36V18L38 8z" fill="rgba(10,50,140,0.5)" stroke="rgba(100,170,255,0.3)" stroke-width="1" />
              <!-- lock body -->
              <rect x="26" y="40" width="24" height="18" rx="3" fill="#1a6bff" opacity=".9" />
              <!-- lock shackle -->
              <path d="M30 40v-5a8 8 0 0116 0v5" stroke="#3d8bff" stroke-width="2.5" stroke-linecap="round" fill="none" />
              <!-- keyhole -->
              <circle cx="38" cy="49" r="3" fill="#040d1a" />
              <rect x="37" y="49" width="2" height="5" rx="1" fill="#040d1a" />
            </svg>
          </div>
        </div>


        <div class="heading">
          <div class="sub">AI-Based Network</div>
          <div class="main">THREAT DETECTION</div>
          <div class="amp">&amp; Alert System</div>
          <div class="login-label">Register for your account</div>
        </div>


        <div class="field">
          <span class="icon-left">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
          <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" />
        </div>


        <div class="field">
          <span class="icon-left">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" />
          <span class="icon-right" id="togglePwd" title="Show/hide password">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </span>
        </div>


        <button type="submit" class="btn-register" id="registerBtn">Let's Start</button>


        <div class="footer-row">
          <label class="remember"><input type="checkbox" id="rememberMe" />Remember me</label>
          <button type="button" class="btn-login" id="loginBtn">LOGIN</button>
        </div>
      </div>
    </form>
    <script src="{{ url_for('static', filename='./js/register.js') }}"></script>
  </body>
</html>
