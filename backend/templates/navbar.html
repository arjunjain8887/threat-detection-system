
<style>
    :root {
  --bg-primary: #070b14;
  --bg-secondary: #0c1220;
  --bg-card: #0f1829;
  --border: #1a2840;
  --border-bright: #1e3050;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-purple: #7c3aed;
  --text-primary: #e2e8f0;
  --text-secondary: #64748b;
  --red: #ef4444;
  --sidebar-width: 200px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  min-height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative; 
  z-index: 10;
}

.sidebar::after {
  content: '';
  position: absolute;
  top: 0; right: 0; width: 1px; height: 100%;
  background: linear-gradient(to bottom, transparent, var(--accent-blue) 30%, var(--accent-cyan) 70%, transparent);
  opacity: 0.3;
}

.logo-area {
  padding: 18px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.02em;
}

.logo-text span { color: var(--accent-cyan); }

.nav {
  padding: 12px 8px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.2s;
  position: relative;
  letter-spacing: 0.02em;
  text-decoration: none; /* 🚨 ADDED THIS: Removes the default link underline */
}

.nav-item:hover { background: var(--bg-card); color: var(--text-primary); }

.nav-item.active {
  background: rgba(59,130,246,0.12);
  color: var(--accent-blue);
  border: 1px solid rgba(59,130,246,0.2);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 60%;
  background: var(--accent-blue);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 6px var(--accent-blue);
}

.nav-icon { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.nav-icon svg { width: 16px; height: 16px; }

.badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── MAIN AREA ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  height: 56px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
  flex-shrink: 0;
}

.page-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.03em;
  flex: 1;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.notif-btn {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
}

.notif-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: border-color 0.2s;
}

.user-pill:hover { border-color: var(--border-bright); }

.avatar {
  width: 26px; height: 26px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
}


/* ── DROPDOWN MENU STYLES ── */
.user-pill-container {
  position: relative; /* Keeps the dropdown attached to the pill */
}

.dropdown-menu {
  position: absolute;
  top: 120%; /* Pushes it just below the user pill */
  right: 0;
  width: 170px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 0;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
  display: none; /* Hidden by default! */
  flex-direction: column;
  z-index: 100;
}

/* We will add this class via JavaScript to make it visible */
.dropdown-menu.show {
  display: flex;
}

.dropdown-item {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.dropdown-item:hover {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
}

.dropdown-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* Make the logout button red to indicate danger/exit */
.dropdown-item.text-red {
  color: var(--red);
}

.dropdown-item.text-red:hover {
  background: rgba(239, 68, 68, 0.1); 
}
</style>

  <header class="topbar">
    <div class="page-title">Dashboard</div>
    <div class="topbar-right">
      <div class="notif-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>

        <div class="user-pill" id="userPillBtn">
          <div class="avatar">A</div>
          Admin
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><polyline points="6 9 12 15 18 9"/></svg>
        </div>

        <div class="dropdown-menu" id="userDropdown">
          <div class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profile
          </div>
          <div class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
            Settings
          </div>
          <div class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Alert
          </div>
          <div class="dropdown-divider"></div>
          
          <div class="dropdown-item text-red" onclick="window.location.href='/login'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout

      </div>

<script>


  document.getElementsByClassName('page-title')[0].textContent = document.title; // Dynamically set the page title in the topbar
    window.addEventListener('load', () => {
  
          const userPillBtn = document.getElementById('userPillBtn');
      const userDropdown = document.getElementById('userDropdown');

      if (userPillBtn && userDropdown) {
        userPillBtn.addEventListener('click', (event) => {
          event.stopPropagation(); 
          userDropdown.classList.toggle('show'); 
        });

        document.addEventListener('click', (event) => {
          if (!userDropdown.contains(event.target)) {
            userDropdown.classList.remove('show');
          }
        });
      }

          
          const navLinks = document.querySelectorAll('.nav .nav-item');
      
          const currentPath = window.location.pathname;

          navLinks.forEach(link => {
        
              if (link.getAttribute('href') === currentPath) {
                  link.classList.add('active');
        } else {
                  link.classList.remove('active');
        }
        
      });

    });
</script>
