<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Based Network Threat Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='./css/login.css') }}"/>
   
</head>
  <body>
    <canvas id="bg"></canvas>
  <form method="post" action="/login">
    <div class="card">
  
      <div class="shield-wrap">
        <div class="shield">
          <svg id="svg-sheild" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
      </div>

  
      <div class="heading">
        <div class="sub">AI-Based Network</div>
        <div class="main">THREAT DETECTION</div>
        <div class="amp">&amp; Alert System</div>
        <div class="login-label">Login to your account</div>
      </div>

  
      <div class="field">
        <span class="icon-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </span>
        <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" />
      </div>

  
      <div class="field">
        <span class="icon-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </span>
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" />
        <span class="icon-right" id="togglePwd" title="Show/hide password">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </span>
      </div>

  
      <button type="submit" class="btn-login" id="loginBtn">LOGIN</button>

  
      <div class="footer-row">
        <label class="remember"><input type="checkbox" id="rememberMe" />Remember me</label>
      <button type="button" class="btn-register" id="registerBtn">REGISTER</button>
      </div>
    </div>
    </form>
    <script src="{{ url_for('static', filename='./js/login.js') }}"></script>
  </body>
</html>
